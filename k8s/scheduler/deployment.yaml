apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: smartqueue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: de4dl0ck/smartqueue-scheduler:latest
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: smartqueue-secrets
                  key: db-url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
