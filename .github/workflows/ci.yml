name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: de4dl0ck/smartqueue

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_PREFIX }}-api:latest,${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Predictor
        uses: docker/build-push-action@v5
        with:
          context: ./services/predictor
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_PREFIX }}-predictor:latest,${{ env.IMAGE_PREFIX }}-predictor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/worker
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_PREFIX }}-worker:latest,${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Scheduler
        uses: docker/build-push-action@v5
        with:
          context: ./services/scheduler
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_PREFIX }}-scheduler:latest,${{ env.IMAGE_PREFIX }}-scheduler:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest,${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install fastapi uvicorn psycopg2-binary requests pydantic python-dotenv slowapi prometheus-fastapi-instrumentator prometheus-client

      - name: Check API imports
        run: |
          cd services/api
          python -c "from app.main import app; print('API imports OK')"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scheduler deps
        run: |
          cd services/scheduler
          npm install

      - name: TypeScript typecheck
        run: |
          cd services/scheduler
          npx tsc --noEmit
